<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sneha ❤️ Kishan Wedding</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:black; color:white; overflow-x:hidden; }
canvas { position:fixed; top:0; left:0; z-index:-1; }

#loader { position:fixed; width:100%; height:100%; background:black; display:flex; justify-content:center; align-items:center; z-index:9999; font-size:2rem; }

.hero { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; }

h1 { font-family:'Playfair Display'; font-size:4rem; background:linear-gradient(gold,white); -webkit-background-clip:text; color:transparent; }

.btn { padding:10px 25px; background:gold; border:none; border-radius:25px; cursor:pointer; margin:10px; }

section { padding:80px 20px; text-align:center; }

.card { background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; margin:10px; display:inline-block; }

#countdown { font-size:2rem; }

.game-box { margin-top:20px; }

</style>
</head>
<body>

<div id="loader">Loading Love Story... 💖</div>
<canvas id="bg"></canvas>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="hero">
<h1>Sneha ❤️ Kishan</h1>
<p>Forever Begins 💍</p>
<button class="btn" onclick="start()">Enter</button>
</div>

<section>
<h2>Events</h2>
<div class="card">Haldi & Mehendi - 24 April</div>
<div class="card">Wedding - 25 April</div>
</section>

<section>
<h2>Countdown</h2>
<p id="countdown"></p>
</section>

<!-- GAME 1 -->
<section>
<h2>🎮 Click Love Game</h2>
<button class="btn" onclick="score++">❤️</button>
<p id="score">0</p>
</section>

<!-- GAME 2 -->
<section>
<h2>🎯 Catch the Heart</h2>
<button id="moveBtn" class="btn" style="position:relative">💖 Catch Me</button>
</section>

<!-- GAME 3 -->
<section>
<h2>❓ Couple Quiz</h2>
<p>Who is more romantic?</p>
<button class="btn" onclick="quiz('Sneha')">Sneha</button>
<button class="btn" onclick="quiz('Kishan')">Kishan</button>
<p id="quizResult"></p>
</section>

<!-- GAME 4 -->
<section>
<h2>💘 Memory Tap</h2>
<button class="btn" onclick="tapGame()">Tap Fast!</button>
<p id="tapScore">0</p>
</section>

<script>

// Loader
window.onload=()=>{ setTimeout(()=>{ loader.style.display='none'; },2000); }

function start(){ music.play(); window.scrollTo({top:window.innerHeight,behavior:'smooth'}); }

// Countdown
let w = new Date("Apr 25, 2026").getTime();
setInterval(()=>{
let n=new Date().getTime(); let d=w-n;
let day=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((d%(1000*60*60))/(1000*60));
let s=Math.floor((d%(1000*60))/1000);
countdown.innerHTML=`${day}d ${h}h ${m}m ${s}s`;
},1000);

// Game1
let score=0;
setInterval(()=>{ document.getElementById('score').innerText=score; },100);

// Game2
let btn=document.getElementById('moveBtn');
btn.onmouseover=()=>{
btn.style.left=Math.random()*300+'px';
btn.style.top=Math.random()*200+'px';
}

// Game3
function quiz(ans){
quizResult.innerText = ans=="Sneha" ? "Correct ❤️" : "Try Again 😄";
}

// Game4
let tScore=0;
function tapGame(){ tScore++; tapScore.innerText=tScore; }

// 3D
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:bg});
renderer.setSize(window.innerWidth,window.innerHeight);

const geo=new THREE.TorusGeometry(10,2,16,100);
const mat=new THREE.MeshStandardMaterial({color:0xffd700});
const r1=new THREE.Mesh(geo,mat);
const r2=new THREE.Mesh(geo,mat);
r2.position.x=15;
scene.add(r1,r2);

const light=new THREE.PointLight(0xffffff,1);
light.position.set(20,20,20);
scene.add(light);

camera.position.z=40;

function animate(){ requestAnimationFrame(animate); r1.rotation.x+=0.01; r2.rotation.y+=0.01; renderer.render(scene,camera);} animate();

// Animation
gsap.from("h1",{y:-100,opacity:0});
gsap.from("section",{opacity:0,y:50,stagger:0.3});

</script>

</body>
</html>
