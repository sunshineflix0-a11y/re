<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Experience Pro</title>

<style>
:root{
--bg:#0a0e27;
--card:rgba(255,255,255,0.06);
--gold:#d4af37;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:white;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:60px;height:60px;
border:4px solid #333;
border-top:4px solid var(--gold);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#111;
position:sticky;
top:0;
z-index:10;
}

/* BUTTON */
button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:var(--gold);
font-weight:bold;
}

/* CONTAINER */
.container{
padding:15px;
}

/* CARD */
.card{
background:var(--card);
padding:15px;
margin:12px 0;
border-radius:12px;
backdrop-filter:blur(10px);
}

/* MODAL */
#rsvp{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:20px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

/* FADE */
.fade{
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* RESPONSIVE */
@media(max-width:768px){
.topbar{flex-direction:column;gap:10px;}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
<p id="loadTxt">Loading experience...</p>
</div>

<!-- TOPBAR -->
<div class="topbar">
<div id="title">💍 Wedding Experience</div>
<div>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('hi')">HI</button>
</div>
</div>

<div class="container">

<div class="card fade">
<h2 id="welcome">Welcome</h2>
<p id="desc">Join the wedding of Sneha & Kishan 💍</p>
</div>

<div class="card fade">
<h3>🎉 RSVP System</h3>
<button onclick="openRSVP()" id="rsvpBtn">Open RSVP</button>
</div>

<div class="card fade">
<h3>📥 Download Invitation</h3>
<button onclick="downloadCard()" id="downloadBtn">Download Card</button>
</div>

<div class="card fade">
<h3>💖 Love Meter</h3>
<p id="loveText">0%</p>
<button onclick="increaseLove()">Increase Love</button>
</div>

</div>

<!-- RSVP -->
<div id="rsvp">
<div class="box">
<h3 id="formTitle">RSVP</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<button onclick="submitRSVP()" id="submitBtn">Submit</button>
<button onclick="closeRSVP()" id="closeBtn">Close</button>
</div>
</div>

<script>

let lang="en";
let love=0;

/* TEXT ENGINE */
const T={
en:{
welcome:"Welcome",
desc:"Join the wedding of Sneha & Kishan 💍",
rsvp:"Open RSVP",
download:"Download Card",
love:"Love"
},
hi:{
welcome:"स्वागत है",
desc:"स्नेहा और किशन की शादी में शामिल हों 💍",
rsvp:"RSVP खोलें",
download:"कार्ड डाउनलोड करें",
love:"प्यार"
}
};

/* INIT */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
applyLang();
},1200);
}

/* LANGUAGE */
function setLang(l){
lang=l;
applyLang();
}

function applyLang(){
let t=T[lang];

document.getElementById("welcome").innerText=t.welcome;
document.getElementById("desc").innerText=t.desc;
document.getElementById("rsvpBtn").innerText=t.rsvp;
document.getElementById("downloadBtn").innerText=t.download;
document.getElementById("loveText").innerText=love+"% "+t.love;
}

/* RSVP */
function openRSVP(){
document.getElementById("rsvp").style.display="flex";
}

function closeRSVP(){
document.getElementById("rsvp").style.display="none";
}

function submitRSVP(){
let n=document.getElementById("name").value;
if(!n){
alert(lang==="en"?"Enter name":"नाम डालो");
return;
}

/* SAVE DATA */
localStorage.setItem("rsvp",JSON.stringify({
name:n,
email:document.getElementById("email").value
}));

closeRSVP();
alert(lang==="en"?"RSVP saved 💍":"RSVP सेव हो गया 💍");
}

/* LOVE */
function increaseLove(){
love+=10;
if(love>100) love=100;
applyLang();
}

/* DOWNLOAD CARD */
function downloadCard(){
let canvas=document.createElement("canvas");
canvas.width=800;
canvas.height=500;
let x=canvas.getContext("2d");

x.fillStyle="#0a0e27";
x.fillRect(0,0,800,500);

x.fillStyle="gold";
x.font="30px Arial";
x.fillText("💍 Wedding Invitation 💍",200,120);

x.fillStyle="white";
x.font="22px Arial";
x.fillText("Sneha & Kishan",300,220);
x.fillText("You are Invited",320,270);

let a=document.createElement("a");
a.download="invitation.png";
a.href=canvas.toDataURL();
a.click();
}

</script>

</body>
</html>
